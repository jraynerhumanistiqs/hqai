  <path d="M30 30 L30 170 M30 100 L90 100 M90 30 L90 170"
        stroke="#FFFFFF" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Q - outlined/stroke circle with tail -->
  <circle cx="195" cy="105" r="68" stroke="#FFFFFF" stroke-width="18" fill="none"/>
  <line x1="230" y1="140" x2="275" y2="175" stroke="#FFFFFF" stroke-width="18" stroke-linecap="round"/>

  <!-- Period -->
  <circle cx="310" cy="158" r="10" fill="#999999"/>

  <!-- a - outlined -->
  <path d="M340 105 C340 80, 380 70, 390 90 L390 160 M390 110 C370 95, 340 100, 340 120 C340 145, 370 150, 390 135"
        stroke="#999999" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- i - with dot -->
  <line x1="420" y1="95" x2="420" y2="160" stroke="#999999" stroke-width="12" stroke-linecap="round"/>
  <circle cx="420" cy="70" r="8" fill="#999999"/>
</svg>
